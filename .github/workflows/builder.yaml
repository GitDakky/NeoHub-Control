name: Build NeoHub Control add-on

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

env:
  ADDON_PATH: addons/neohub_control

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare build metadata
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.info.outputs.architectures }}
      build_matrix: ${{ steps.matrix.outputs.matrix }}
      description: ${{ steps.info.outputs.description }}
      image_name: ${{ steps.normalize.outputs.image_name }}
      name: ${{ steps.info.outputs.name }}
      registry_prefix: ${{ steps.normalize.outputs.registry_prefix }}
      url: ${{ steps.info.outputs.url }}
      version: ${{ steps.info.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Read add-on metadata
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: ./${{ env.ADDON_PATH }}

      - name: Normalise image metadata
        id: normalize
        shell: bash
        run: |
          image='${{ steps.info.outputs.image }}'
          if [[ -z "${image}" || "${image}" == "null" ]]; then
            echo "::error::addons/neohub_control/config.yaml must define an image reference"
            exit 1
          fi
          echo "image_name=${image##*/}" >> "${GITHUB_OUTPUT}"
          echo "registry_prefix=${image%/*}" >> "${GITHUB_OUTPUT}"

      - name: Prepare multi-arch matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.06.0
        with:
          architectures: ${{ steps.info.outputs.architectures }}
          image-name: ${{ steps.normalize.outputs.image_name }}
          registry-prefix: ${{ steps.normalize.outputs.registry_prefix }}

  build:
    name: Build ${{ matrix.arch }} image
    needs: prepare
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.build_matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Build add-on image
        uses: home-assistant/builder/actions/build-image@2026.06.0
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: ./${{ env.ADDON_PATH }}
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          labels: |
            io.hass.type=app
            io.hass.name=${{ needs.prepare.outputs.name }}
            io.hass.description=${{ needs.prepare.outputs.description }}
            io.hass.url=${{ needs.prepare.outputs.url }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          version: ${{ needs.prepare.outputs.version }}

  manifest:
    name: Publish multi-arch manifest
    needs:
      - prepare
      - build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.06.0
        with:
          architectures: ${{ needs.prepare.outputs.architectures }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ needs.prepare.outputs.image_name }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          registry-prefix: ${{ needs.prepare.outputs.registry_prefix }}
