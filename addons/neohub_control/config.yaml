name: "NeoHub Control"
slug: neohub_control
description: "Expose Heatmiser NeoHub thermostats, sockets, diagnostics, and zone/room metadata to Home Assistant via MQTT Discovery."
version: "0.2.5"
url: "https://github.com/GitDakky/NeoHub-Control"
image: "ghcr.io/gitdakky/neohub-control"
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false
apparmor: true
hassio_api: true
hassio_role: default
services:
  - mqtt:need
options:
  username: ""
  password: ""
  url: "https://neohub.co.uk/"
  poll_interval: 60
  discovery_prefix: homeassistant
  base_topic: neohub
  property_name: Home
  hub_zones: []
  room_mappings: []
  mqtt:
    host: ""
    port: 1883
    username: ""
    password: ""
    ssl: false
schema:
  username: str
  password: password
  url: url
  poll_interval: int(15,3600)
  discovery_prefix: str
  base_topic: str
  property_name: str
  hub_zones:
    - hub_id: str?
      hub_name: str?
      zone: str
  room_mappings:
    - hub_id: str?
      hub_name: str?
      thermostat: str
      room: str
      zone: str?
  mqtt:
    host: str?
    port: port
    username: str?
    password: password?
    ssl: bool?
